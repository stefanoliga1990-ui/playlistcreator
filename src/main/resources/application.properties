spring.application.name=playlistcreator
spring.config.import=optional:file:./application-local.properties
spring.jackson.deserialization.fail-on-unknown-properties=false
logging.level.com.application.playlistcreator=INFO
server.port=8080
server.ssl.enabled=false

playlistcreator.setlistfm.base-url=https://api.setlist.fm/rest
playlistcreator.setlistfm.api-key=${SETLISTFM_API_KEY:}
playlistcreator.setlistfm.accept-language=it
playlistcreator.setlistfm.max-pages-to-scan=5
playlistcreator.setlistfm.min-songs-per-setlist=6
playlistcreator.setlistfm.max-age-months=6

playlistcreator.spotify.api-base-url=https://api.spotify.com/v1
playlistcreator.spotify.accounts-base-url=https://accounts.spotify.com
playlistcreator.spotify.client-id=${SPOTIFY_CLIENT_ID:}
playlistcreator.spotify.client-secret=${SPOTIFY_CLIENT_SECRET:}
playlistcreator.spotify.redirect-uri=${SPOTIFY_REDIRECT_URI:http://127.0.0.1:8080/login/oauth2/code/spotify}
playlistcreator.spotify.scopes=playlist-modify-public playlist-modify-private user-top-read
playlistcreator.spotify.market=IT
playlistcreator.spotify.default-public-playlist=true

playlistcreator.lastfm.base-url=https://ws.audioscrobbler.com/2.0
playlistcreator.lastfm.api-key=${LASTFM_API_KEY:}
playlistcreator.lastfm.shared-secret=${LASTFM_SHARED_SECRET:}

playlistcreator.genre-playlist.default-artist-limit=15
playlistcreator.genre-playlist.default-tracks-per-artist=3
playlistcreator.genre-playlist.max-artist-limit=25
playlistcreator.genre-playlist.max-tracks-per-artist=10
